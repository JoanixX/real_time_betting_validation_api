name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  SQLX_OFFLINE: true

jobs:
  ci:
    name: fmt / clippy / test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: instalar rust toolchain (1.84 estable pinneado)
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: 1.84.0
          components: rustfmt, clippy

      - name: verificar formateo (cargo fmt)
        run: cargo fmt --all -- --check

      - name: analisis estatico (cargo clippy)
        run: cargo clippy -- -D warnings

      - name: ejecutar tests
        run: cargo test --all-features
